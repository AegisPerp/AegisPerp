version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: perp-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3456
      - API_URL=http://backend:3456
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.perp.rule=Host(`[yourdomain.fun]`)"
      - "traefik.http.routers.perp.entrypoints=websecure"
      - "traefik.http.routers.perp.tls.certresolver=letsencrypt"
      - "traefik.http.services.perp.loadbalancer.server.port=3456"
    networks:
      - traefik-net
    depends_on:
      - backend

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: perp-backend
    restart: unless-stopped
    volumes:
      - ./server/data:/app/data
    environment:
      - BACKEND_PORT=3456
      - DATABASE_PATH=/app/data/platform.db
      - JUPITER_PRICE_API=https://api.jup.ag/price/v2
      - SOLANA_RPC_URL=https://api.mainnet-beta.solana.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.perp-api.rule=Host(`api.[yourdomain.fun]`)"
      - "traefik.http.routers.perp-api.entrypoints=websecure"
      - "traefik.http.routers.perp-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.perp-api.loadbalancer.server.port=3456"
    networks:
      - traefik-net

networks:
  traefik-net:
    external: true
